name: Automated Cell Validation
on: [push]

jobs:
  run-analysis:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run Script
        env:
          JIRA_SERVER: ${{ secrets.JIRA_SERVER }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python validate_and_track.py
      - name: Commit and Push results
        run: |
          git config --global user.name "Agratas Automation Bot"
          git config --global user.email "automation@agratas.com"
          git add latest_results.csv
          git commit -m "Update validation telemetry [skip ci]" || echo "No changes to commit"
          git push
