name: Create Jira Ticket with CSV
on: [workflow_dispatch]

jobs:
  jira-task:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install jira

      # Replace this step with whatever generates your CSV, 
      # or ensure validation_results.csv is in your repo.
      - name: Verify CSV exists
        run: find . -name "*.xlsx"

      - name: Run Jira Automation
        env:
          JIRA_SERVER: ${{ secrets.JIRA_SERVER }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_API_TOKEN: ${{ secrets.JIRA_API_TOKEN }}
        run: python test_jira_ping.py
